# Server
server.port=8080

# H2 in-memory database (zero setup)
spring.datasource.url=jdbc:h2:mem:upimesh
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 web console — DISABLED by default (exposes full SQL access).
# Enable only for local dev: run with --spring.h2.console.enabled=true
spring.h2.console.enabled=false

# Logging
logging.level.com.demo.upimesh=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Idempotency window (how long a packet hash is remembered)
upi.mesh.idempotency-ttl-seconds=86400

# Packet freshness window — anything older than this is rejected as replay
upi.mesh.packet-max-age-seconds=86400

# CORS — comma-separated list of allowed origins
upi.mesh.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080}

# Bridge API key — when set, /api/bridge/* requires X-Api-Key header.
# Leave blank (default) for demo mode (no auth).
upi.mesh.bridge.api-key=${BRIDGE_API_KEY:}

# Rate limiting
upi.mesh.rate-limit.requests-per-minute=120
